<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prank Call</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== Screen 1: Home ===== -->
  <div id="home-screen" class="screen active">
    <div class="home-card">
      <h1 class="home-title">Prank Call</h1>
      <input type="text" id="name-input" class="home-input" placeholder="Your name" maxlength="24" autocomplete="off" />
      <button id="btn-create-lobby" class="home-btn home-btn-create">Create Lobby</button>
      <div class="home-divider"><span>or join one</span></div>
      <div class="home-join-row">
        <input type="text" id="lobby-code-input" class="home-input home-code-input" placeholder="CODE" maxlength="4" autocomplete="off" />
        <button id="btn-join-lobby" class="home-btn home-btn-join">Join</button>
      </div>
    </div>
  </div>

  <!-- ===== Screen 3: Lobby ===== -->
  <div id="lobby-screen" class="screen">
    <div class="lobby-header">
      <div class="lobby-header-left">
        <span class="app-name">Prank Call</span>
        <span class="lobby-code-display">Code: <strong id="lobby-code-text"></strong></span>
        <button id="btn-copy-code" class="btn-copy-code">Copy</button>
      </div>
      <span class="user-info">Logged in as <strong id="lobby-user-name"></strong></span>
      <button id="btn-leave" class="btn-leave">Leave Lobby</button>
    </div>
    <div id="lobby-grid" class="lobby-grid">
      <div class="lobby-empty">Waiting for others to join...</div>
    </div>
  </div>

  <!-- ===== Incoming Call Overlay ===== -->
  <div id="incoming-call-overlay" class="incoming-call-overlay">
    <div class="incoming-call-card">
      <div class="avatar" style="background: var(--green); width: 72px; height: 72px; font-size: 1.4rem;">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="36" height="36" fill="#fff">
          <path d="M6.62 10.79a15.053 15.053 0 006.59 6.59l2.2-2.2a1.003 1.003 0 011.01-.24c1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1C10.07 21 3 13.93 3 4c0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.1.31.03.66-.25 1.02l-2.2 2.2z"/>
        </svg>
      </div>
      <div class="caller-name" id="incoming-caller-name">Someone</div>
      <div class="calling-text">is calling you...</div>
      <div class="call-timer-countdown" id="incoming-countdown">Auto-declining in 20s</div>
      <div class="call-actions">
        <button id="btn-decline-call" class="btn-decline" aria-label="Decline">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08a.956.956 0 010-1.36C3.36 8.94 7.42 7 12 7s8.64 1.94 11.71 4.72c.18.18.29.44.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.1-.7-.28-.79-.73-1.68-1.36-2.66-1.85a.993.993 0 01-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/>
          </svg>
        </button>
        <button id="btn-accept-call" class="btn-accept" aria-label="Accept">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M6.62 10.79a15.053 15.053 0 006.59 6.59l2.2-2.2a1.003 1.003 0 011.01-.24c1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1C10.07 21 3 13.93 3 4c0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.1.31.03.66-.25 1.02l-2.2 2.2z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ===== Screen 4: Calling (outgoing) ===== -->
  <div id="calling-screen" class="screen">
    <div class="avatar" style="background: var(--accent); width: 80px; height: 80px; font-size: 1.6rem;">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="#fff">
        <path d="M6.62 10.79a15.053 15.053 0 006.59 6.59l2.2-2.2a1.003 1.003 0 011.01-.24c1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1C10.07 21 3 13.93 3 4c0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.1.31.03.66-.25 1.02l-2.2 2.2z"/>
      </svg>
    </div>
    <div class="calling-text-large">Calling <strong id="calling-target-name"></strong>...</div>
    <button id="btn-cancel-call" class="btn-cancel-call">Cancel</button>
  </div>

  <!-- ===== Screen 5: Active Call ===== -->
  <div id="call-screen" class="screen">
    <div class="call-info">
      <div class="call-status-text">In a call with</div>
      <div class="call-partner-name" id="call-partner-name">Someone</div>
    </div>
    <div class="call-timer" id="call-timer">00:00</div>
    <div class="mic-indicator">
      <span class="mic-dot"></span>
      Microphone active
    </div>
    <button id="btn-hangup" class="btn-hangup" aria-label="Hang up">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08a.956.956 0 010-1.36C3.36 8.94 7.42 7 12 7s8.64 1.94 11.71 4.72c.18.18.29.44.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.1-.7-.28-.79-.73-1.68-1.36-2.66-1.85a.993.993 0 01-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/>
      </svg>
    </button>
  </div>

  <!-- ===== Toast ===== -->
  <div id="toast" class="toast"></div>

  <!-- ===== Scripts ===== -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="app.js"></script>

</body>
</html>
